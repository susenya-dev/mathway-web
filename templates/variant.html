{% extends "base.html" %}

{% block content %}

<h2>Вариант {{ var_num }}</h2>

<form method="POST" action="/check_variant/{{ var_num }}">

    {% for task in tasks %}
    <div class="card p-3 mb-3">
        <p><b>Задание {{ loop.index }}</b></p>
        <p>{{ task.question }}</p>

        {% if task.image_url and task.image_url|trim and task.image_url != 'images/2/none.png' %}
            <img src="{{ url_for('static', filename=task.image_url) }}" class="img-fluid w-50 mb-2">
        {% endif %}

        <input type="text"
               name="answer_{{ task.id }}"
               class="form-control"
               placeholder="Введите ответ"
               >
    </div>
    {% endfor %}

    <button type="submit" class="btn btn-success">Проверить</button>
    <a href="{{ url_for('home') }}" class="btn btn-secondary">На главную</a>

</form>

{% endblock %}
