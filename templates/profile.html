<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль пользователя</title>
<!--    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Профиль пользователя</h4>
            </div>
            <div class="card-body">
                <div class="mb-4">
                    <h5 class="text-dark">Имя пользователя: <span class="fw-bold">{{ current_user.username }}</span></h5>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <div class="p-3 bg--dark bg-opacity-10 border border-success rounded">
                            <h6 class="text-success mb-1">Рейтинг</h6>
                            <p class="h4 mb-0 text-success fw-bold">0</p>
                        </div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <div class="p-3 bg--dark bg-opacity-10 border border-success rounded">
                            <h6 class="text-success mb-1">Решено вариантов</h6>
                            <p class="h4 mb-0 text-success fw-bold">0</p>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="p-3 bg--dark bg-opacity-10 border border-success rounded">
                    <h6 class="text-success mb-1">Процент принятия</h6>
                    <p class="h4 mb-0 text-success fw-bold">0%</p>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <a href="/" class="btn btn-outline-secondary">Вернуться на главную</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
