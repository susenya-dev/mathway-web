<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль пользователя</title>
    <link rel="icon" href="{{ url_for('static', filename='images/mathway.ico') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
    <div class="card shadow-sm">

        <div class="card-header bg-dark text-white text-center">
            <h4 class="mb-0">Профиль пользователя</h4>
        </div>

        <div class="card-body text-center">

            <div class="mb-3">
                <img src="{{ url_for('static', filename=current_user.avatar or 'avatars/none_avatar.jpg') }}"
                     alt="avatar"
                     class="rounded-circle border border-success p-2"
                     width="150" height="150">
            </div>

            <form action="/upload_avatar" method="POST" enctype="multipart/form-data">
                <label class="btn btn-primary btn-sm">
                    Загрузить фото
                    <input type="file" name="avatar" hidden onchange="this.form.submit()">
                </label>
            </form>
            <hr>

            <h5 class="mt-3">
                Имя пользователя:
                <span class="fw-bold">{{ current_user.username }}</span>
            </h5>

        </div>


        <div class="card-body pt-0">

            <div class="row text-center">

                <div class="col-md-4 mb-3">
                    <div class="p-3 border rounded bg-white">
                        <div class="text-success fw-semibold">Рейтинг</div>
                        <div class="fs-4 fw-bold">0</div>
                    </div>
                </div>

                <div class="col-md-4 mb-3">
                    <div class="p-3 border rounded bg-white">
                        <div class="text-success fw-semibold">Решено вариантов</div>
                        <div class="fs-4 fw-bold">{{ current_user.solved_var }}</div>
                    </div>
                </div>

                <div class="col-md-4 mb-3">
                    <div class="p-3 border rounded bg-white">
                        <div class="text-success fw-semibold">Решено задач</div>
                        <div class="fs-4 fw-bold">{{ current_user.count_task }}</div>
                    </div>
                </div>

            </div>

        </div>

        <div class="card-footer text-center bg-white">
            <a href="/" class="btn btn-outline-secondary btn-sm">
                Вернуться на главную
            </a>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
