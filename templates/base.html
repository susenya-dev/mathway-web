<!DOCTYPE html>
<html>
<head>
    <title>MathWay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="icon" href="{{ url_for('static', filename='images/mathway.ico') }}">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand d-flex align-items-center" href="/">
    <img src="{{ url_for('static', filename='images/logo.png') }}"
         alt="logo"
         height="40"
         class="me-2">
            MathWay
        </a>

        <div>
            {% if current_user.is_authenticated %}
                <span class="text-white me-3">
                    {{ current_user.username }}
                </span>
                <a href="/logout" class="btn btn-danger btn-sm">Выйти</a>
            {% else %}
                <a href="/login" class="btn btn-secondary btn-sm me-2">Вход</a>
                <a href="/register" class="btn btn-primary btn-sm">Регистрация</a>
            {% endif %}
        </div>

    </div>
</nav>

<div class="container mt-5">
    {% block content %}{% endblock %}
</div>

</body>
</html>
